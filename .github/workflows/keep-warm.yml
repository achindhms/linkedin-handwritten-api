name: Keep API warm

# Pings /health every 10 minutes so Render's free web service (which sleeps after
# 15 minutes idle) never gets the chance to spin down. Uses GitHub's free
# scheduled-workflow minutes — costs nothing on a public repo.
#
# Setup: Settings -> Secrets and variables -> Actions -> New repository secret
#   Name: PING_URL
#   Value: https://your-app-name.onrender.com

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sf "${{ secrets.PING_URL }}/health" || echo "Ping failed (service may be cold-starting, that's fine)"
